<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Weeks Notice – Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; font-size: 14px; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 8px; }
    .primary { background: #2563eb; color: white; }
    .secondary { background: #f3f4f6; color: #333; }
    .message { padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; display: none; }
    .error { background: #fee2e2; color: #dc2626; }
    .success { background: #d1fae5; color: #059669; }
  </style>
</head>
<body>
<div class="card">
  <h1>Two Weeks Notice 🎁</h1>
  <p>Never forget a birthday or anniversary again.</p>
  <div id="message" class="message"></div>
  <input type="email" id="email" placeholder="Email address" />
  <input type="password" id="password" placeholder="Password" />
  <button class="primary" onclick="signUp()">Create Account</button>
  <button class="secondary" onclick="signIn()">Sign In</button>
</div>

<script>
  const { createClient } = supabase;
  const client = createClient(
    'https://hjvpjvjzpmmgijcmgztu.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqdnBqdmp6cG1tZ2lqY21nenR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTU2MjUsImV4cCI6MjA5MjAzMTYyNX0.nBf-TWBEFxxFlD0HVUvk4iqPLGt4iZ5z7Drmb5hVN4w'
  );

  function showMessage(text, type) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
    el.style.display = 'block';
  }

  async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await client.auth.signUp({ email, password });
    if (error) return showMessage(error.message, 'error');
    showMessage('Account created! Signing you in...', 'success');
    setTimeout(() => window.location.href = 'app.html', 1500);
  }

  async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await client.auth.signInWithPassword({ email, password });
    if (error) return showMessage(error.message, 'error');
    window.location.href = 'app.html';
  }
</script>
</body>
</html>
