<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Weeks Notice</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; min-height: 100vh; }
    header { background: white; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 20px; }
    header button { background: none; border: 1px solid #ddd; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .container { max-width: 600px; margin: 32px auto; padding: 0 16px; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    h2 { font-size: 18px; margin-bottom: 16px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; }
    .row { display: flex; gap: 10px; }
    .row input, .row select { margin-bottom: 10px; }
    button.primary { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; }
    .person { border: 1px solid #eee; border-radius: 8px; padding: 16px; margin-bottom: 10px; }
    .person h3 { font-size: 16px; margin-bottom: 4px; }
    .person p { font-size: 13px; color: #666; }
    .badge { display: inline-block; background: #eff6ff; color: #2563eb; font-size: 12px; padding: 2px 8px; border-radius: 12px; margin-top: 6px; margin-right: 4px; }
    .empty { text-align: center; color: #999; padding: 32px; }
  </style>
</head>
<body>

<header>
  <h1>Two Weeks Notice 🎁</h1>
  <button onclick="signOut()">Sign Out</button>
</header>

<div class="container">
  <div class="card">
    <h2>Add a Person</h2>
    <input type="text" id="name" placeholder="Name (e.g. Mom, Jake)" />
    <input type="text" id="relationship" placeholder="Relationship (e.g. Sister, Friend)" />
    <h2 style="margin-top:8px;">Add a Date</h2>
    <input type="text" id="label" placeholder="What is it? (e.g. Birthday, Anniversary)" />
    <div class="row">
      <select id="month">
        <option value="">Month</option>
        <option value="1">January</option><option value="2">February</option>
        <option value="3">March</option><option value="4">April</option>
        <option value="5">May</option><option value="6">June</option>
        <option value="7">July</option><option value="8">August</option>
        <option value="9">September</option><option value="10">October</option>
        <option value="11">November</option><option value="12">December</option>
      </select>
      <input type="number" id="day" placeholder="Day" min="1" max="31" />
    </div>
    <button class="primary" onclick="savePerson()">Save Person + Date</button>
  </div>

  <div class="card">
    <h2>Your People</h2>
    <div id="people-list"><div class="empty">No people added yet.</div></div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const client = createClient(
    'https://hjvpjvjzpmmgijcmgztu.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqdnBqdmp6cG1tZ2lqY21nenR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTU2MjUsImV4cCI6MjA5MjAzMTYyNX0.nBf-TWBEFxxFlD0HVUvk4iqPLGt4iZ5z7Drmb5hVN4w'
  );

  const months = ['','January','February','March','April','May','June','July','August','September','October','November','December'];

  async function checkAuth() {
    const { data: { session } } = await client.auth.getSession();
    if (!session) window.location.href = 'signin.html';
    else loadPeople();
  }

  async function signOut() {
    await client.auth.signOut();
    window.location.href = 'signin.html';
  }

  async function savePerson() {
    const { data: { session } } = await client.auth.getSession();
    if (!session) return window.location.href = 'signin.html';

    const name = document.getElementById('name').value.trim();
    const relationship = document.getElementById('relationship').value.trim();
    const label = document.getElementById('label').value.trim();
    const month = parseInt(document.getElementById('month').value);
    const day = parseInt(document.getElementById('day').value);

    if (!name || !label || !month || !day) return alert('Please fill in all fields.');

    const { data: person, error: personError } = await client
      .from('people')
      .insert({ user_id: session.user.id, name, relationship })
      .select().single();

    if (personError) return alert('Error saving person: ' + personError.message);

    const { error: eventError } = await client
      .from('events')
      .insert({ person_id: person.id, label, month, day });

    if (eventError) return alert('Error saving date: ' + eventError.message);

    document.getElementById('name').value = '';
    document.getElementById('relationship').value = '';
    document.getElementById('label').value = '';
    document.getElementById('month').value = '';
    document.getElementById('day').value = '';

    loadPeople();
  }

  async function loadPeople() {
    const { data: { session } } = await client.auth.getSession();
    if (!session) return;

    const { data: people } = await client
      .from('people')
      .select('*, events(*)')
      .eq('user_id', session.user.id)
      .order('created_at', { ascending: false });

    const list = document.getElementById('people-list');
    if (!people || people.length === 0) {
      list.innerHTML = '<div class="empty">No people added yet.</div>';
      return;
    }

    list.innerHTML = people.map(p => `
      <div class="person">
        <h3>${p.name}</h3>
        <p>${p.relationship || ''}</p>
        ${(p.events || []).map(e => `<span class="badge">${e.label}: ${months[e.month]} ${e.day}</span>`).join('')}
      </div>
    `).join('');
  }

  checkAuth();
</script>
</body>
</html>
