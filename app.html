<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Weeks Notice</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; min-height: 100vh; }
    header { background: white; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 20px; }
    header button { background: none; border: 1px solid #ddd; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .container { max-width: 600px; margin: 32px auto; padding: 0 16px; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    h2 { font-size: 18px; margin-bottom: 16px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; }
    .row { display: flex; gap: 10px; }
    .row input, .row select { margin-bottom: 10px; }
    button.primary { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; }
    .person { border: 1px solid #eee; border-radius: 8px; padding: 16px; margin-bottom: 10px; }
    .person h3 { font-size: 16px; margin-bottom: 4px; }
    .person p { font-size: 13px; color: #666; }
    .badge { display: inline-block; background: #eff6ff; color: #2563eb; font-size: 12px; padding: 2px 8px; border-radius: 12px; margin-top: 6px; margin-right: 4px; }
    .empty { text-align: center; color: #999; padding: 32px; }
  </style>
</head>
<body>

<header>
  <h1>Two Weeks Notice 🎁</h1>
  <button onclick="signOut()">Sign Out</button>
</header>

<div class="container">
  <div class="card">
    <h2>Add a Person</h2>
    <input type="text" id="name" placeholder="Name (e.g. Mom, Jake)" />
    <input type="text" id="relationship" placeholder="Relationship (e.g. Sister, Friend)" />
    <h2 style="margin-top:8px;">Add a Date</h2>
    <input type="text" id="label" placeholder="What is it? (e.g. Birthday, Anniversary)" />
    <div class="row">
      <select id="month">
        <option value="">Month</option>
        <option value="1">January</option><option value="2">February</option>
        <option value="3">March</option><option value="4">April</option>
        <option value="5">May</option><option value="6">June</option>
        <option value="7">July</option><option value="8">August</option>
        <option value="9">September</option><option value="10">October</option>
        <option value="11">November</option><option value="12">December</option>
      </select>
      <input type="number" id="day" placeholder="Day" min="1" max="31" />
    </div>
    <button class="primary" onclick="addPerson()">Save Person + Date</button>
  </div>

  <div class="card">
    <h2>Your People
